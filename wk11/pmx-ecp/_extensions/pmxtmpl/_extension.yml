title:  Pharmacometrics Report
author: Mutaz Jaber
version: 1.0.0
quarto-required: ">=1.3.0"
contributes:
  formats:
    pdf:
      keep-tex: true
      pdf-engine: xelatex
      toc: true
      toccolor: blue
      lof: true
      lot: true
      toc-depth: 3
      toc-title: TABLE OF CONTENTS
      link-citations: true
      number-sections: true
      colorlinks: blue
      crossref:
        lof-title: LIST OF IN-TEXT FIGURES
        lot-title: LIST OF IN-TEXT TABLES
      documentclass: scrreprt
      classoption:
        - toc=chapterentrywithdots
        - listof=totoc
        - 11pt
        - headings=small
        - usegeometry
      template-partials:
        - partials/before-body.tex
        - partials/toc.tex
        - partials/title.tex
        - partials/tables.tex
      hyperrefoptions:
        - linktoc=all
        - bookmarks=true
      csl: style.csl
      # geometry:
      #
      #   - margin=.75in
      #   - left=1in
      #   - right=1in
      #   - top=1in
      #   - bottom=3cm
      #   - footskip=2cm
      #   - marginparwidth=1in
      #   - marginparsep=0.75cm
      include-in-header: header.tex
      # mainfont: Times New Roman
      # mainfontoptions:
      #     - Path=./misc/Times/
      #     - Extension=.ttf
      #     - UprightFont=*
      #     - BoldFont=* Bold
      #     - ItalicFont=* Italic
      # sansfont: Times New Roman
      # sansfontoptions:
      #     - Path=./misc/Times/
      #     - Extension=.ttf
      #     - UprightFont=*
      #     - BoldFont=* Bold
      filters:
        - filters/landscape.lua
        - filters/refcross.lua
        - filters/nonmem.lua
      copyright: >
          Add your copyright statement here. For example: "Copyright (c) 2024, Your Name. All rights reserved."

